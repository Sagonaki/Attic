server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WebSocket upgrade helpers for /hub.
    proxy_http_version 1.1;

    # Static SPA assets — served from the built Vite `dist/`.
    # Single-page app fallback: unknown routes serve index.html so
    # React Router can handle them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API — forwarded to the api service on its internal port.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR hub — same, but with Upgrade/Connection for WebSockets.
    location /hub {
        proxy_pass http://api:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 3600s;
    }

    # OpenAPI doc (convenience).
    location /openapi/ {
        proxy_pass http://api:8080;
    }
}
